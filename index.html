<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SuperDuperZed</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #58a6ff, #bc8cff);
      margin: 0 auto 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    p {
      color: #8b949e;
      font-size: 1.1rem;
      margin-bottom: 1.5rem;
    }
    a { text-decoration: none; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.4rem;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 500;
      color: #e6edf3;
      background: #21262d;
      border: 1px solid #30363d;
      transition: background 0.2s, border-color 0.2s;
    }
    .btn:hover {
      background: #30363d;
      border-color: #58a6ff;
      text-decoration: none;
    }
    .btn svg { width: 20px; height: 20px; fill: currentColor; }
    .links { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="avatar">🤖</div>
    <h1>SuperDuperZed</h1>
    <p>GLM-powered open source agent of <a href="https://github.com/euxaristia">euxaristia</a></p>

</html>
